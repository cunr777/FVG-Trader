<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FVG Trader — Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .app-layout { grid-template-columns: 220px 1fr !important; transition: grid-template-columns 0.65s cubic-bezier(0.4,0,0.2,1); }
    .app-layout.wl-collapsed { grid-template-columns: 0px 1fr !important; }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
        FVG Trader
      </div>
      <nav class="navbar-nav">
        <a href="index.html"       class="nav-link active">📈 Chart</a>
        <a href="performance.html" class="nav-link">📊 Performance</a>
        <a href="strategy.html"    class="nav-link">📖 Strategie</a>
      </nav>
      <button class="btn-theme" id="theme-toggle" onclick="toggleTheme()" title="Hell/Dunkel wechseln">
        <span id="theme-icon">☀️</span><span id="theme-label"> Hell</span>
      </button>
      <div class="navbar-ticker">
        <span style="color:var(--text-muted);font-size:11px" id="navbar-sym-label">—</span>
        <span class="ticker-price" id="navbar-price">—</span>
        <span class="ticker-change" id="navbar-change">—</span>
      </div>
    </nav>

    <!-- Watchlist toggle tab (hangs off right edge of sidebar) -->
    <button id="wl-toggle" onclick="toggleWatchlist()" title="Watchlist ein/ausblenden" style="
      position:fixed;
      top:50%;
      left:220px;
      transform:translateY(-50%);
      z-index:20;
      width:16px;
      height:48px;
      border:1px solid var(--border);
      border-left:none;
      border-radius:0 var(--radius) var(--radius) 0;
      background:var(--bg-secondary);
      color:var(--text-muted);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      transition:left 0.65s cubic-bezier(0.4,0,0.2,1), background 0.15s;
    " id="wl-toggle">
      <svg id="wl-toggle-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- Watchlist -->
    <aside class="sidebar-left">
      <div class="sidebar-header">
        <span class="sidebar-title">Watchlist</span>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="watchlist-search" class="search-input"
          placeholder="Altcoin suchen… (Enter)"
          autocomplete="off" spellcheck="false" />
      </div>
      <div class="search-error" id="search-error"></div>
      <div class="search-hint"  id="search-hint"></div>
      <div class="watchlist" id="watchlist"></div>
    </aside>

    <!-- Chart -->
    <main class="chart-area">
      <div class="chart-toolbar">
        <span class="chart-symbol" id="chart-symbol">—</span>
        <div class="tf-group">
          <button class="tf-btn active" data-tf="1h">1H</button>
          <button class="tf-btn"        data-tf="4h">4H</button>
        </div>
        <div class="chart-meta">
          <div class="chart-meta-pill"><div class="cm-dot" style="background:#2196f3"></div>Bull FVG</div>
          <div class="chart-meta-pill"><div class="cm-dot" style="background:#9c27b0"></div>Bear FVG</div>
          <div class="chart-meta-pill">SL · TP 1:3</div>
        </div>
      </div>

      <div class="chart-container">
        <div id="chart"></div>
        <div class="chart-placeholder" id="chart-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          </svg>
          <p>Altcoin aus der Watchlist wählen</p>
        </div>
      </div>


    </main>

  </div>

  <!-- Affiliate Bar -->
  <div class="affiliate-bar">
    📊 Kursdaten powered by <a id="aff-link" href="#" target="_blank" rel="noopener">Binance</a>
    &nbsp;·&nbsp; Noch kein Konto? <a id="aff-link2" href="#" target="_blank" rel="noopener">Jetzt registrieren →</a>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="js/config.js"></script>
  <script src="js/binance.js"></script>
  <script src="js/fvg.js"></script>
  <script src="js/chart-manager.js"></script>
  <script src="js/watchlist.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Affiliate links
    document.addEventListener('DOMContentLoaded', () => {
      const code = CONFIG.BINANCE_REF_CODE;
      const url  = code && code !== 'DEIN_CODE'
        ? `https://www.binance.com/de/register?ref=${code}`
        : 'https://www.binance.com/de/register';
      document.querySelectorAll('#aff-link, #aff-link2').forEach(a => a.href = url);
    });
  </script>
  <script>
    function toggleTheme() {
      const body    = document.body;
      const icon    = document.getElementById('theme-icon');
      const label   = document.getElementById('theme-label');
      const isLight = body.classList.toggle('light');
      localStorage.setItem('fvg_theme', isLight ? 'light' : 'dark');
      if (isLight) {
        icon.textContent  = '\uD83C\uDF19'; // 🌙
        label.textContent = ' Dunkel';
      } else {
        icon.textContent  = '\u2600\uFE0F'; // ☀️
        label.textContent = ' Hell';
      }
      if (typeof ChartManager !== 'undefined') ChartManager.setTheme(isLight);
    }

    function toggleWatchlist() {
      const layout  = document.querySelector('.app-layout');
      const icon    = document.getElementById('wl-toggle-icon');
      const btn     = document.getElementById('wl-toggle');
      const sidebar = document.querySelector('.sidebar-left');
      const collapsed = layout.classList.toggle('wl-collapsed');
      sidebar.classList.toggle('collapsed', collapsed);

      // Pfeil-Richtung (Button-Position läuft via CSS-Transition)
      icon.innerHTML = collapsed
        ? '<polyline points="9 18 15 12 9 6"/>'
        : '<polyline points="15 18 9 12 15 6"/>';
      btn.style.left = collapsed ? '0px' : '220px';

      // Kontinuierlich resizen während der gesamten Animation (650ms)
      const duration = 650;
      const start    = performance.now();
      function tick(now) {
        window.dispatchEvent(new Event('resize'));
        if (now - start < duration) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
  </script>
  <script>
    // Restore saved theme after all scripts are loaded
    (function() {
      const saved = localStorage.getItem('fvg_theme');
      if (saved === 'light') {
        document.body.classList.add('light');
        const icon  = document.getElementById('theme-icon');
        const label = document.getElementById('theme-label');
        if (icon)  icon.textContent  = '\uD83C\uDF19';
        if (label) label.textContent = ' Dunkel';
        // Chart theme applied in main.js DOMContentLoaded after ChartManager.init()
      }
    })();
  </script>
</body>
</html>
