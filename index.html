<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FVG Trader — Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .app-layout { grid-template-columns: 220px 1fr !important; }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
        FVG Trader
      </div>
      <nav class="navbar-nav">
        <a href="index.html"       class="nav-link active">📈 Chart</a>
        <a href="trades.html"      class="nav-link">💡 Trade Ideas</a>
        <a href="performance.html" class="nav-link">📊 Performance</a>
      </nav>
      <div class="navbar-ticker">
        <span style="color:var(--text-muted);font-size:11px" id="navbar-sym-label">—</span>
        <span class="ticker-price" id="navbar-price">—</span>
        <span class="ticker-change" id="navbar-change">—</span>
      </div>
    </nav>

    <!-- Watchlist -->
    <aside class="sidebar-left">
      <div class="sidebar-header">
        <span class="sidebar-title">Watchlist</span>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="watchlist-search" class="search-input"
          placeholder="Altcoin suchen… (Enter)"
          autocomplete="off" spellcheck="false" />
      </div>
      <div class="search-error" id="search-error"></div>
      <div class="search-hint"  id="search-hint"></div>
      <div class="watchlist" id="watchlist"></div>
    </aside>

    <!-- Chart -->
    <main class="chart-area">
      <div class="chart-toolbar">
        <span class="chart-symbol" id="chart-symbol">—</span>
        <div class="tf-group">
          <button class="tf-btn active" data-tf="1h">1H</button>
          <button class="tf-btn"        data-tf="4h">4H</button>
        </div>
        <div class="chart-meta">
          <div class="chart-meta-pill"><div class="cm-dot" style="background:#26a69a"></div>Bull FVG</div>
          <div class="chart-meta-pill"><div class="cm-dot" style="background:#ef5350"></div>Bear FVG</div>
          <div class="chart-meta-pill">SL · TP 1:3</div>
        </div>
        <button id="btn-labels" class="tf-btn" title="Labels einblenden"
          onclick="ChartManager.toggleLabels(this)">% Labels</button>
      </div>

      <div class="chart-container">
        <div id="chart"></div>
        <div class="chart-placeholder" id="chart-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          </svg>
          <p>Altcoin aus der Watchlist wählen</p>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-item">FVGs&nbsp;<span class="stat-value" id="stat-total">—</span></div>
        <div class="stat-item">Wins&nbsp;<span class="stat-value green" id="stat-wins">—</span></div>
        <div class="stat-item">Losses&nbsp;<span class="stat-value red" id="stat-losses">—</span></div>
        <div class="stat-item">Win-Rate&nbsp;<span class="stat-value" id="stat-winrate">—</span></div>
        <div class="stat-item">Return&nbsp;<span class="stat-value" id="stat-return">—</span></div>
        <div class="stat-item" style="margin-left:auto;border-right:none;color:var(--text-dim);font-size:10px">Gap ≥0.5% · SL=Unterkante · 1:3 RR</div>
      </div>
    </main>

  </div>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="js/config.js"></script>
  <script src="js/binance.js"></script>
  <script src="js/fvg.js"></script>
  <script src="js/chart-manager.js"></script>
  <script src="js/watchlist.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
